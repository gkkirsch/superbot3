<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #09090b;
      padding: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #e4e4e7;
      border-radius: 20px;
      transition: background 0.15s ease;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      transition: transform 0.15s ease;
    }
    .toggle input:checked + .slider {
      background: #18181b;
    }
    .toggle input:checked + .slider::after {
      transform: translateX(16px);
    }
    .divider {
      height: 1px;
      background: #f4f4f5;
      margin: 10px 0;
    }
    .broker-config input {
      width: 100%;
      padding: 6px 8px;
      background: #fafafa;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      color: #71717a;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 10px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .broker-config input:focus { border-color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="row">
    <div style="display:flex;align-items:center;gap:6px;">
      <img src="logo.png" width="18" height="18" style="border-radius:4px;">
      <h1>UI Feedback</h1>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="divider"></div>
  <div class="broker-config">
    <input type="text" id="broker-url" value="http://localhost:3100" placeholder="Broker URL">
  </div>
  <script src="popup.js"></script>
</body>
</html>
